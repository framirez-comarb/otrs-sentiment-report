name: Generate OTRS Intent Classification Report

on:
  # Runs daily at 12:00 Argentina time (15:00 UTC)
  schedule:
    - cron: '0 15 * * *'

  # Allow manual trigger
  workflow_dispatch:

# Permissions needed for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run report generator
        env:
          OTRS_URL: ${{ secrets.OTRS_URL }}
          OTRS_USER: ${{ secrets.OTRS_USER }}
          OTRS_PASS: ${{ secrets.OTRS_PASS }}
          SEARCH_FULLTEXT: ${{ vars.SEARCH_FULLTEXT || '' }}
          SEARCH_QUEUES: ${{ vars.SEARCH_QUEUES || 'SIFERE,Módulo DDJJ' }}
          DATE_FROM: ${{ vars.DATE_FROM || '2026-01-01' }}
          OVERLAP_DAYS: ${{ vars.OVERLAP_DAYS || '14' }}
        run: |
          python main.py

      - name: Deploy to GitHub Pages
        if: success()
        run: |
          cd docs
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Update report - $(date '+%Y-%m-%d %H:%M')"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

      - name: Commit updated ticket cache to main branch
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/tickets_analyzed.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "Update ticket cache - $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          fi

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_number }}
          path: |
            docs/
            data/
          retention-days: 30
